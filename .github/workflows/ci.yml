name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy torch --index-url https://download.pytorch.org/whl/cpu
          pip install tqdm pygame pytest flake8

      - name: Lint with flake8
        run: |
          flake8 src/config.py src/sudoku_game.py src/rl_agent.py src/backtracking_solver.py scripts/train.py scripts/solver.py --count --statistics

      - name: Run tests
        run: |
          python -m pytest tests/ -v
