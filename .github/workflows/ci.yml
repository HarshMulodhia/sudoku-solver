name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy torch --index-url https://download.pytorch.org/whl/cpu
          pip install tqdm pygame pytest flake8

      - name: Lint with flake8
        run: |
          flake8 config.py sudoku_game.py rl_agent.py train.py solver.py --count --max-line-length=120 --statistics --ignore=E501,W503,E303,E302,W291,E261,E241,E251,W293,E203,E221,E226,E128,E305,F401

      - name: Run tests
        run: |
          python -m pytest tests/ -v
